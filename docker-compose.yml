version: '3.8'

services:
  remindr:
    image: larsmikki/remindr:latest
    container_name: remindr
    ports:
      - "3080:3080"
    volumes:
      - remindr-data:/app/data
    environment:
      - PORT=3080
      - REMINDERS_FILE=/app/data/reminders.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3080/api/health"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  remindr-data:
